<radialGradient id="glow" cx="0.5" cy="0.24" r="0.55"><stop offset="0" stop-color="#ff5a2a" stop-opacity="0.16"/><stop offset="0.5" stop-color="#c23a18" stop-opacity="0.05"/><stop offset="1" stop-color="#000000" stop-opacity="0"/></radialGradient>
